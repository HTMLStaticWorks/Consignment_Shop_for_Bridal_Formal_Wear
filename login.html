<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | LUXE BRIDAL</title>
    <link rel="icon" type="image/svg+xml" href="images/favicon.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body data-theme="light">

    <!-- Minimal Auth Header -->
    <div class="position-fixed top-0 end-0 p-3 d-flex align-items-center gap-2" style="z-index: 1000;">

        <button id="theme-toggle" class="btn auth-control-btn p-2" aria-label="Toggle Theme">
            <i class="bi bi-moon"></i>
        </button>
        <button id="rtl-toggle" class="btn auth-control-btn p-2" aria-label="Toggle RTL">
            <i class="bi bi-text-paragraph"></i>
        </button>
    </div>

    <!-- Login Container -->
    <main class="auth-container luxury-shadow">
        <div class="text-center mb-4">
            <a href="index.html" class="brand-logo justify-content-center mb-3">
                <svg xmlns="http://www.w3.org/2000/svg" height="38" viewBox="0 0 180 38" fill="none" aria-label="Luxe Bridal Logo" style="display:inline-block;vertical-align:middle;"><g transform="translate(2,2)"><polygon points="17,0 26,10 17,28 8,10" fill="none" stroke="#C9A96E" stroke-width="1.8"/><polygon points="17,7 22,12 17,22 12,12" fill="#C9A96E" opacity="0.7"/><line x1="8" y1="10" x2="26" y2="10" stroke="#C9A96E" stroke-width="1.2"/></g><text x="40" y="26" font-family="Georgia,serif" font-size="18" font-weight="700" letter-spacing="2" fill="currentColor">LUXE</text><text x="101" y="26" font-family="Georgia,serif" font-size="15" font-weight="400" letter-spacing="1.5" fill="#C9A96E">BRIDAL</text></svg>
            </a>
            <h1 class="luxury-heading h3 mb-2">Welcome Back</h1>
            <p class="text-muted small">Sign in to your Luxe account</p>
        </div>

        <form id="login-form">
            <div class="mb-4">
                <label class="small text-uppercase letter-spacing-1 mb-2">Email Address</label>
                <input type="email" class="form-control-luxury w-100" required>
            </div>
            <div class="mb-4">
                <label class="small text-uppercase letter-spacing-1 mb-2">Password</label>
                <div class="position-relative">
                    <input type="password" class="form-control-luxury w-100" id="password" required>
                    <button type="button" class="password-toggle-btn" data-target="password">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
                <div class="d-flex justify-content-between align-items-center mt-2">
                    <div class="form-check mb-0">
                        <input class="form-check-input" type="checkbox" id="rememberMe">
                        <label class="form-check-label small text-muted" for="rememberMe">Remember me</label>
                    </div>
                    <a href="#" class="small text-gold">Forgot Password</a>
                </div>
            </div>

            <button type="submit" class="btn-gold w-100 py-3 mt-4">Sign In</button>
        </form>

        <div class="social-login-divider">
            <span>Or continue with</span>
        </div>

        <div class="social-buttons">
            <button class="btn btn-social" title="Google">
                <i class="bi bi-google"></i>
            </button>
            <button class="btn btn-social" title="Facebook">
                <i class="bi bi-facebook"></i>
            </button>
            <button class="btn btn-social" title="Apple">
                <i class="bi bi-apple"></i>
            </button>
        </div>


        <div class="text-center mt-5">
            <p class="small text-muted mb-0">Don't have an account? <a href="signup.html" class="text-gold">Sign Up</a>
            </p>
        </div>
    </main>

    <!-- Footer Space -->
    <div class="py-5"></div>

    <script src="js/main.js"></script>
</body>

</html>
