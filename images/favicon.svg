  <!-- Top facet left -->
  <line x1="32" y1="6" x2="20" y2="22" stroke="#C9A96E" stroke-width="1.5" opacity="0.6"/>
  <!-- Top facet right -->
  <line x1="32" y1="6" x2="44" y2="22" stroke="#C9A96E" stroke-width="1.5" opacity="0.6"/>
</svg>
