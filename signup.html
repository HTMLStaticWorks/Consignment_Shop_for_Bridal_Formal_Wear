<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | LUXE BRIDAL</title>
    <link rel="icon" type="image/png" href="images/logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body data-theme="light">

    <!-- Minimal Auth Header -->
    <div class="position-fixed top-0 end-0 p-3 d-flex align-items-center gap-2" style="z-index: 1000;">

        <button id="theme-toggle" class="btn auth-control-btn p-2" aria-label="Toggle Theme">
            <i class="bi bi-moon"></i>
        </button>
        <button id="rtl-toggle" class="btn auth-control-btn p-2" aria-label="Toggle RTL">
            <i class="bi bi-text-paragraph"></i>
        </button>
    </div>

    <!-- Signup Container -->
    <main class="auth-container luxury-shadow" style="max-width: 500px;">
        <div class="text-center mb-4">
            <a href="index.html" class="brand-logo justify-content-center mb-3">
                <img src="images/logo.png" alt="Luxe Bridal Logo" class="logo-img me-2" style="height: 40px;">
                Luxe Bridal
            </a>
            <h1 class="luxury-heading h3 mb-2">Create Account</h1>
            <p class="text-muted small">Join the Luxe community of brides and consignors</p>
        </div>

        <form id="signup-form">
            <div class="mb-4">
                <label class="small text-uppercase letter-spacing-1 mb-2">First Name</label>
                <input type="text" class="form-control-luxury w-100" required>
            </div>
            <div class="mb-4">
                <label class="small text-uppercase letter-spacing-1 mb-2">Last Name</label>
                <input type="text" class="form-control-luxury w-100" required>
            </div>
            <div class="mb-4">
                <label class="small text-uppercase letter-spacing-1 mb-2">Email Address</label>
                <input type="email" class="form-control-luxury w-100" required>
            </div>
            <div class="mb-4">
                <label class="small text-uppercase letter-spacing-1 mb-2">Password</label>
                <div class="position-relative">
                    <input type="password" class="form-control-luxury w-100" id="password" required>
                    <button type="button" class="password-toggle-btn" data-target="password">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>

            <div class="form-check mb-4">
                <input class="form-check-input" type="checkbox" id="termsCheck" required>
                <label class="form-check-label small text-muted" for="termsCheck">
                    I agree to the Terms of Service and Privacy Policy.
                </label>
            </div>

            <button type="submit" class="btn-gold w-100 py-3 mt-2">Create Account</button>
        </form>

        <div class="social-login-divider">
            <span>Or join via</span>
        </div>

        <div class="social-buttons">
            <button class="btn btn-social" title="Google">
                <i class="bi bi-google"></i>
            </button>
            <button class="btn btn-social" title="Facebook">
                <i class="bi bi-facebook"></i>
            </button>
            <button class="btn btn-social" title="Apple">
                <i class="bi bi-apple"></i>
            </button>
        </div>


        <div class="text-center mt-5">
            <p class="small text-muted mb-0">Already have an account? <a href="login.html" class="text-gold">Log In</a>
            </p>
        </div>
    </main>

    <!-- Footer Space -->
    <div class="py-5"></div>

    <script src="js/main.js"></script>
</body>

</html>
